services:
  - type: web
    name: ctfd
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "CTFd:create_app()" --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false
        value: "postgresql://postgres:Nn_1_*xzPyJk?4CT2nU!wYxNF6xp@database-2.cluc8i0ci1ow.ap-southeast-2.rds.amazonaws.com:5432/ctfd"
      - key: SECRET_KEY
        sync: false
        value: "change-this-to-a-random-secret-key-in-production"
      - key: WORKERS
        value: "1"
      - key: SKIP_DB_PING
        value: "true"
    disk:
      name: ctfd-uploads
      mountPath: /var/uploads
      sizeGB: 1
